# ============================================================
# GitHub Actions Workflow — Deploy LAR System to Azure Web App
# ============================================================
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions → Secrets tab):
#
# For Agent, Supplier, and Supervision apps (OIDC — set automatically when
# connecting the app via Azure App Service → Deployment Center):
#   AZUREAPPSERVICE_CLIENTID_D69A9EA7F8524CCCBBD7066E6B90DD3C   - Agent client ID
#   AZUREAPPSERVICE_TENANTID_29B6E855E16A471AAF4C9570D40E7B57   - Agent tenant ID
#   AZUREAPPSERVICE_SUBSCRIPTIONID_207113D6983740A7B30BB05C5A73C9E8 - Agent subscription ID
#   AZUREAPPSERVICE_CLIENTID_D8DDB62B6B9E4C6C91E6658B7A249ED2   - Supplier client ID
#   AZUREAPPSERVICE_TENANTID_DD0792E13DC640CABCD2799153B61EDC   - Supplier tenant ID
#   AZUREAPPSERVICE_SUBSCRIPTIONID_2BF9BCACCA544FB4AA8364C3BF3E0BFC - Supplier subscription ID
#   AZUREAPPSERVICE_CLIENTID_0C44E64F3D2444F9A7D73D4B3CA119AC   - Supervision client ID
#   AZUREAPPSERVICE_TENANTID_8C0BE25D7F0342CBA9D69CD2A22DF0A0   - Supervision tenant ID
#   AZUREAPPSERVICE_SUBSCRIPTIONID_D21BF9711A484C91A5610092135959FB - Supervision subscription ID
#
# For B2C and Services apps (publish profiles — download from Azure portal):
#   AZUREAPPSERVICE_PUBLISHPROFILE_B2C        - Publish profile for B2C web app
#   AZUREAPPSERVICE_PUBLISHPROFILE_SERVICES   - Publish profile for Services web app
#   AZURE_WEBAPP_NAME_B2C                     - e.g. lar-b2c
#   AZURE_WEBAPP_NAME_SERVICES                - e.g. lar-services
#
# Optional (for post-deploy health checks and log collection):
#   AZURE_CREDENTIALS                         - Service principal JSON
#   AZURE_RESOURCE_GROUP                      - e.g. rg-lar-system
#   DB_SERVER_NAME                            - Azure MySQL Flexible Server name (e.g. lar-mysql-server)
#
# Database schema import (Step 7) is handled by the 'Database Setup' workflow.
# Trigger it manually from the Actions tab after the first deployment.
# See AZURE_DEPLOYMENT.md and database-setup.yml for details.
# ============================================================

name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  PHP_VERSION: '8.2'

jobs:
  # ----------------------------------------------------------
  # Job 1: Build & validate — capture all PHP errors/warnings
  #         as a downloadable artifact for audit analysis
  # ----------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysqli, mbstring, gd, curl, zip, xml, intl
          ini-values: display_errors=On, log_errors=On, error_reporting=E_ALL
          coverage: none

      - name: PHP syntax check — b2c (errors captured for audit)
        run: find b2c -name "*.php" -print0 | xargs -0 -P1 -I{} php -l {} 2>&1 || true
        continue-on-error: true

      - name: PHP syntax check — agent (errors captured for audit)
        run: find agent -name "*.php" -print0 | xargs -0 -P1 -I{} php -l {} 2>&1 || true
        continue-on-error: true

      - name: PHP syntax check — supplier (errors captured for audit)
        run: find supplier -name "*.php" -print0 | xargs -0 -P1 -I{} php -l {} 2>&1 || true
        continue-on-error: true

      - name: PHP syntax check — supervision (errors captured for audit)
        run: find supervision -name "*.php" -print0 | xargs -0 -P1 -I{} php -l {} 2>&1 || true
        continue-on-error: true

      - name: PHP syntax check — services (errors captured for audit)
        run: find services -name "*.php" -print0 | xargs -0 -P1 -I{} php -l {} 2>&1 || true
        continue-on-error: true

      - name: Collect all PHP syntax errors into report
        run: |
          echo "=== LAR System PHP Syntax Analysis Report ===" > /tmp/php-syntax-report.txt
          echo "Generated: $(date -u)" >> /tmp/php-syntax-report.txt
          echo "" >> /tmp/php-syntax-report.txt
          for MODULE in b2c agent supplier supervision services; do
            echo "--- Module: ${MODULE} ---" >> /tmp/php-syntax-report.txt
            find "${MODULE}" -name "*.php" -print0 \
              | xargs -0 -P1 -I{} sh -c 'php -l "$1" 2>&1 | grep -v "No syntax errors" || true' _ {} \
              >> /tmp/php-syntax-report.txt 2>&1 || true
          done
          echo "" >> /tmp/php-syntax-report.txt
          echo "=== End of Report ===" >> /tmp/php-syntax-report.txt
          cat /tmp/php-syntax-report.txt

      - name: Upload PHP syntax report
        uses: actions/upload-artifact@v4
        with:
          name: php-syntax-report
          path: /tmp/php-syntax-report.txt
          retention-days: 30

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lar-system-build
          path: .
          retention-days: 1

  # ----------------------------------------------------------
  # Job 2a: Deploy B2C (Consumer Website) — main entry point
  # NOTE: Requires AZUREAPPSERVICE_PUBLISHPROFILE_B2C and AZURE_WEBAPP_NAME_B2C
  #       secrets. Connect this app via Azure App Service → Deployment Center
  #       to use OIDC authentication instead.
  # ----------------------------------------------------------
  deploy-b2c:
    name: Deploy B2C
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}
    continue-on-error: true   # skip gracefully until publish-profile secret is configured

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lar-system-build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (B2C)
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_B2C }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B2C }}
          package: .

  # ----------------------------------------------------------
  # Job 2b: Deploy Agent Panel
  # Uses OIDC federated identity (set up via Azure App Service → Deployment Center)
  # ----------------------------------------------------------
  deploy-agent:
    name: Deploy Agent Panel
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lar-system-build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D69A9EA7F8524CCCBBD7066E6B90DD3C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_29B6E855E16A471AAF4C9570D40E7B57 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_207113D6983740A7B30BB05C5A73C9E8 }}

      - name: Deploy to Azure Web App (Agent)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'lar-agent'
          slot-name: 'Production'
          package: .

  # ----------------------------------------------------------
  # Job 2c: Deploy Supplier Portal
  # Uses OIDC federated identity (set up via Azure App Service → Deployment Center)
  # ----------------------------------------------------------
  deploy-supplier:
    name: Deploy Supplier Portal
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lar-system-build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D8DDB62B6B9E4C6C91E6658B7A249ED2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DD0792E13DC640CABCD2799153B61EDC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2BF9BCACCA544FB4AA8364C3BF3E0BFC }}

      - name: Deploy to Azure Web App (Supplier)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'lar-supplier'
          slot-name: 'Production'
          package: .

  # ----------------------------------------------------------
  # Job 2d: Deploy Supervision Panel
  # Uses OIDC federated identity (set up via Azure App Service → Deployment Center)
  # ----------------------------------------------------------
  deploy-supervision:
    name: Deploy Supervision Panel
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lar-system-build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0C44E64F3D2444F9A7D73D4B3CA119AC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8C0BE25D7F0342CBA9D69CD2A22DF0A0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D21BF9711A484C91A5610092135959FB }}

      - name: Deploy to Azure Web App (Supervision)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'lar-supervision'
          slot-name: 'Production'
          package: .

  # ----------------------------------------------------------
  # Job 2e: Deploy Web Services API
  # NOTE: Requires AZUREAPPSERVICE_PUBLISHPROFILE_SERVICES and AZURE_WEBAPP_NAME_SERVICES
  #       secrets. Connect this app via Azure App Service → Deployment Center
  #       to use OIDC authentication instead.
  # ----------------------------------------------------------
  deploy-services:
    name: Deploy Web Services
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    environment:
      name: production
    continue-on-error: true   # skip gracefully until publish-profile secret is configured

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lar-system-build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (Services)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_SERVICES }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_SERVICES }}
          package: .

  # ----------------------------------------------------------
  # Job 3: Post-deployment health checks
  #         Verifies all web apps return HTTP 2xx/3xx and that
  #         the Azure MySQL server is reachable.
  #         Results are reported — not used to block the deploy.
  # ----------------------------------------------------------
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs:
      - deploy-b2c
      - deploy-agent
      - deploy-supplier
      - deploy-supervision
      - deploy-services
    permissions: {}
    if: always()

    steps:
      - name: Wait 90s for apps to start
        run: sleep 90

      - name: HTTP health check — all verticals
        run: |
          REPORT_FILE="/tmp/health-check.txt"
          echo "=== Post-Deploy HTTP Health Check ===" > "${REPORT_FILE}"
          echo "Generated: $(date -u)" >> "${REPORT_FILE}"
          echo "" >> "${REPORT_FILE}"

          UNHEALTHY=0
          for APP_NAME in \
            "${{ secrets.AZURE_WEBAPP_NAME_B2C }}" \
            "lar-agent" \
            "lar-supplier" \
            "lar-supervision" \
            "${{ secrets.AZURE_WEBAPP_NAME_SERVICES }}"; do
            if [[ -z "${APP_NAME}" ]]; then continue; fi
            URL="https://${APP_NAME}.azurewebsites.net"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 --retry 2 "${URL}" 2>/dev/null || echo "000")
            if [[ "${HTTP_STATUS}" =~ ^[23] ]]; then
              echo "  [OK]     ${APP_NAME}: HTTP ${HTTP_STATUS}" >> "${REPORT_FILE}"
            else
              echo "  [WARN]   ${APP_NAME}: HTTP ${HTTP_STATUS} — app may not be responding" >> "${REPORT_FILE}"
              UNHEALTHY=$((UNHEALTHY + 1))
            fi
          done

          echo "" >> "${REPORT_FILE}"
          echo "Unhealthy apps: ${UNHEALTHY}" >> "${REPORT_FILE}"
          cat "${REPORT_FILE}"

      - name: Log in to Azure
        if: secrets.AZURE_CREDENTIALS != ''
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: MySQL connectivity check
        run: |
          if [[ -z "${{ secrets.AZURE_CREDENTIALS }}" ]] || [[ -z "${{ secrets.DB_SERVER_NAME }}" ]]; then
            echo "AZURE_CREDENTIALS or DB_SERVER_NAME secret not set — skipping MySQL connectivity check."
            exit 0
          fi

          DB_HOST="${{ secrets.DB_SERVER_NAME }}.mysql.database.azure.com"
          echo "Checking TCP connectivity to ${DB_HOST}:3306 ..."
          if timeout 15 bash -c "echo > /dev/tcp/${DB_HOST}/3306" 2>/dev/null; then
            echo "  [OK]   MySQL server is reachable at ${DB_HOST}:3306"
          else
            echo "  [WARN] Cannot reach MySQL server at ${DB_HOST}:3306"
            echo "         Ensure the Azure MySQL firewall allows Azure services (0.0.0.0–0.0.0.0)."
          fi

  # ----------------------------------------------------------
  # Job 4: Collect runtime logs from all Azure Web Apps
  #         Runs after all deploys — downloads PHP error logs,
  #         application event logs, and HTTP access logs.
  #         Logs are uploaded as a GitHub artifact for audit.
  #
  #         REQUIRES: AZURE_CREDENTIALS secret and
  #                   AZURE_RESOURCE_GROUP secret (see above)
  # ----------------------------------------------------------
  collect-logs:
    name: Collect Azure Logs
    runs-on: ubuntu-latest
    needs:
      - deploy-b2c
      - deploy-agent
      - deploy-supplier
      - deploy-supervision
      - deploy-services
      - health-check
    permissions: {}
    # Run even if some deploy jobs fail so partial logs are still collected
    if: always()

    steps:
      - name: Wait 30s for apps to generate errors
        run: sleep 30

      - name: Log in to Azure
        if: secrets.AZURE_CREDENTIALS != ''
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable filesystem logging on all Web Apps
        if: secrets.AZURE_CREDENTIALS != '' && secrets.AZURE_RESOURCE_GROUP != ''
        run: |
          for APP in \
            "${{ secrets.AZURE_WEBAPP_NAME_B2C }}" \
            "lar-agent" \
            "lar-supplier" \
            "lar-supervision" \
            "${{ secrets.AZURE_WEBAPP_NAME_SERVICES }}"; do
            if [[ -z "${APP}" ]]; then continue; fi
            echo "Enabling logging for ${APP}..."
            az webapp log config \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${APP}" \
              --application-logging filesystem \
              --level verbose \
              --web-server-logging filesystem \
              --detailed-error-messages true \
              --failed-request-tracing true 2>&1 || echo "WARNING: could not configure logging for ${APP}"
          done

      - name: Download logs from all Web Apps
        if: secrets.AZURE_CREDENTIALS != '' && secrets.AZURE_RESOURCE_GROUP != ''
        run: |
          mkdir -p /tmp/azure-logs
          for APP in \
            "${{ secrets.AZURE_WEBAPP_NAME_B2C }}" \
            "lar-agent" \
            "lar-supplier" \
            "lar-supervision" \
            "${{ secrets.AZURE_WEBAPP_NAME_SERVICES }}"; do
            if [[ -z "${APP}" ]]; then continue; fi
            echo "Downloading logs for ${APP}..."
            az webapp log download \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${APP}" \
              --log-file "/tmp/azure-logs/${APP}-logs.zip" 2>&1 \
              || echo "WARNING: could not download logs for ${APP}"
          done
          ls -lh /tmp/azure-logs/ 2>/dev/null || true

      - name: Create placeholder log directory if Azure credentials not configured
        if: secrets.AZURE_CREDENTIALS == '' || secrets.AZURE_RESOURCE_GROUP == ''
        run: |
          mkdir -p /tmp/azure-logs
          echo "Azure credentials not configured — log collection skipped." > /tmp/azure-logs/README.txt

      - name: Upload Azure runtime logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-runtime-logs
          path: /tmp/azure-logs/
          retention-days: 30

